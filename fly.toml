# fly.toml app configuration file generated for jh-portfolio on 2026-07-22T20:26:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jh-portfolio'
primary_region = 'ord'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
